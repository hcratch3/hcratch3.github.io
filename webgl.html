<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Controller</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="webglCanvas"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // WebGL初期化
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('webglCanvas')});
        renderer.setSize(window.innerWidth, window.innerHeight);

        const shapes = [];

        camera.position.z = 5;

        // 背景色を変更
        function setBackgroundColor(color) {
            scene.background = new THREE.Color(color);
        }

        // 立体を生成
        function createShape(type, size) {
            let geometry;
            if (type === 'sphere') {
                geometry = new THREE.SphereGeometry(size, 32, 32);
            } else if (type === 'cube') {
                geometry = new THREE.BoxGeometry(size, size, size);
            } else if (type === 'cone') {
                geometry = new THREE.ConeGeometry(size, size * 2, 32);
            }

            const material = new THREE.MeshBasicMaterial({color: 0xffff00});
            const shape = new THREE.Mesh(geometry, material);
            scene.add(shape);
            shapes.push(shape);
        }

        // 立体を移動
        function moveShape(direction, distance) {
            const shape = shapes[shapes.length - 1]; // 最後に生成された立体を操作
            if (!shape) return;

            if (direction === 'up') {
                shape.position.y += distance;
            } else if (direction === 'down') {
                shape.position.y -= distance;
            } else if (direction === 'left') {
                shape.position.x -= distance;
            } else if (direction === 'right') {
                shape.position.x += distance;
            } else if (direction === 'forward') {
                shape.position.z -= distance;
            } else if (direction === 'backward') {
                shape.position.z += distance;
            }
        }

        // BroadcastChannelでScratchからのメッセージを受信
        const channel = new BroadcastChannel('webgl_channel');
        channel.onmessage = (event) => {
            const {type, color, shape, size, direction, distance} = event.data;
            if (type === 'setBackgroundColor') {
                setBackgroundColor(color);
            } else if (type === 'createShape') {
                createShape(shape, size);
            } else if (type === 'moveShape') {
                moveShape(direction, distance);
            }
        };

        // アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
