<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Scene</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="webglCanvas"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Three.jsの初期化
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webglCanvas') });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // 立体の保持
        const shapes = {};

        // カメラの初期位置
        camera.position.z = 5;

        // アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // メッセージ受信用のBroadcastChannel
        const channel = new BroadcastChannel('webgl_channel');

        // 背景色を変更する関数
        function setBackgroundColor(color) {
            scene.background = new THREE.Color(color);
        }

        // 立体を生成する関数
        function createShape(name, type, size) {
            let geometry;

            switch (type) {
                case 'sphere':
                    geometry = new THREE.SphereGeometry(size, 32, 32);
                    break;
                case 'cube':
                    geometry = new THREE.BoxGeometry(size, size, size);
                    break;
                case 'cone':
                    geometry = new THREE.ConeGeometry(size, size * 2, 32);
                    break;
                default:
                    console.error('Unknown shape type: ', type);
                    return;
            }

            const material = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const shape = new THREE.Mesh(geometry, material);
            scene.add(shape);
            shapes[name] = shape;
        }

        // 立体の色を変更する関数
        function setShapeColor(name, color) {
            if (shapes[name]) {
                shapes[name].material.color.set(color);
            }
        }

        // 立体を移動する関数
        function moveShape(name, direction, distance) {
            const shape = shapes[name];
            if (!shape) return;

            switch (direction) {
                case 'up':
                    shape.position.y += distance;
                    break;
                case 'down':
                    shape.position.y -= distance;
                    break;
                case 'left':
                    shape.position.x -= distance;
                    break;
                case 'right':
                    shape.position.x += distance;
                    break;
                case 'forward':
                    shape.position.z -= distance;
                    break;
                case 'backward':
                    shape.position.z += distance;
                    break;
                default:
                    console.error('Unknown direction: ', direction);
            }
        }

        // カメラを移動する関数
        function moveCamera(axis, amount) {
            switch (axis) {
                case 'x':
                    camera.position.x += amount;
                    break;
                case 'y':
                    camera.position.y += amount;
                    break;
                case 'z':
                    camera.position.z += amount;
                    break;
                default:
                    console.error('Unknown axis: ', axis);
            }
        }

        // BroadcastChannelでメッセージを受信したときの処理
        channel.onmessage = (event) => {
            const message = event.data;

            switch (message.type) {
                case 'setBackgroundColor':
                    setBackgroundColor(message.color);
                    break;
                case 'createShape':
                    createShape(message.name, message.shape, message.size);
                    break;
                case 'setShapeColor':
                    setShapeColor(message.name, message.color);
                    break;
                case 'moveShape':
                    moveShape(message.name, message.direction, message.distance);
                    break;
                case 'moveCamera':
                    moveCamera(message.axis, message.amount);
                    break;
                default:
                    console.error('Unknown message type: ', message.type);
            }
        };

        // ウィンドウのリサイズ処理
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
